name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  minimal:
    runs-on: windows-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CoreModules/CoreUI/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install CoreUI dependencies
        working-directory: CoreModules/CoreUI
        run: npm ci

      - name: Run minimal quality gate
        run: python scripts/quality_gate.py --profile minimal

  full:
    runs-on: windows-latest
    timeout-minutes: 45
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CoreModules/CoreUI/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install CoreUI dependencies
        working-directory: CoreModules/CoreUI
        run: npm ci

      - name: Run full quality gate
        run: python scripts/quality_gate.py --profile full

  release:
    runs-on: windows-latest
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CoreModules/CoreUI/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install CoreUI dependencies
        working-directory: CoreModules/CoreUI
        run: npm ci

      - name: Run release quality gate
        run: python scripts/quality_gate.py --profile release

  linux-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CoreModules/CoreUI/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install CoreUI dependencies
        working-directory: CoreModules/CoreUI
        run: npm ci

      - name: Linux startup smoke
        run: bash scripts/startup_smoke.sh

      - name: Docker build smoke
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker build -t chironai:gate .
