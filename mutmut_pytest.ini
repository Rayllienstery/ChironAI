# Pytest config used only by mutmut (mutation testing).
#
# mutmut runs pytest from mutants/ with trampolines; importlib mode can prefer
# site-packages over mutated copies. prepend fixes mapping.
#
# Import paths come from staged domain/ + rag_service/ trees (see capture script)
# and mutants/ on sys.path — do not add Core/ here (breaks mutant key matching).
#
# Listed in [tool.mutmut] also_copy so it is available inside mutants/.

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -q --import-mode=prepend -p no:cacheprovider --tb=short
