[pytest]
testpaths = tests
# Project root and module package roots so "from rag_service...", "from md_ingestion_service...", "from crawler_service..." resolve
pythonpath = . modules/rag_service modules/md_ingestion_service modules/crawler_service
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings = ignore::DeprecationWarning
