services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The upstream qdrant image is intentionally slim and does not include curl/wget.
      # Keep this as a lightweight container-level check so `depends_on: service_healthy` works.
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  app:
    build: .
    ports:
      - "${WEBUI_PORT:-5000}:5000"
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      WEBUI_PORT: "${WEBUI_PORT:-5000}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5000"
      WEBUI_DB_PATH: /app/logs/webui.db
      CHIRONAI_REPO_ROOT: /app
      CHIRONAI_WEBUI_DIR: /app/Core/data/webui
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_URL: http://ollama:11434/api/chat
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_GENERATE_URL: http://ollama:11434/api/generate
      OLLAMA_EMBED_URL: http://ollama:11434/api/embed
    volumes:
      - app_logs:/app/logs
      - app_webui_data:/app/Core/data/webui
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  qdrant_data:
  ollama_data:
  app_logs:
  app_webui_data:
