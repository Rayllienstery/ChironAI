services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${WEBUI_PORT:-5000}:5000"
    environment:
      WEBUI_PORT: "5000"
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  qdrant_data:
