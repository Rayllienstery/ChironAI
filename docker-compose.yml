services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  app:
    build: .
    ports:
      - "${WEBUI_PORT:-5000}:5000"
    environment:
      WEBUI_PORT: "5000"
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_URL: http://ollama:11434/api/chat
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_GENERATE_URL: http://ollama:11434/api/generate
      OLLAMA_EMBED_URL: http://ollama:11434/api/embed
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  qdrant_data:
  ollama_data:
