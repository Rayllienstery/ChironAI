<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChironAI</title>

    <!-- Preconnect to Google Font servers to speed up DNS + TLS handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load Material Symbols asynchronously (non-blocking) via media trick.
         Icons appear slightly after first paint, but they never block rendering. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      />
    </noscript>

    <link rel="stylesheet" href="/src/styles/tokens.css" />

    <!-- Apply saved theme BEFORE first paint to avoid purple flash.
         Reads from localStorage set by applyTheme() in App.jsx. -->
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('chironai_theme') || '{}');
          var mode = t.mode || 'system';
          var light = t.lightAccent || 'purple';
          var dark = t.darkAccent || 'cyan';
          var actual =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.classList.add('theme-' + actual);
          document.documentElement.setAttribute(
            'data-accent-color',
            actual === 'dark' ? dark : light
          );
        } catch (e) {}
      })();
    </script>

    <!-- Stand-by screen shown before React mounts -->
    <style>
      body { margin: 0; }

      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--md-sys-color-surface, #f3f0f4);
        z-index: 9999;
        font-family: 'Google Sans', 'Roboto', sans-serif;
      }
      #app-loader__card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
        user-select: none;
      }
      #app-loader__icon {
        font-family: 'Material Symbols Outlined';
        font-size: 48px;
        line-height: 1;
        color: var(--md-sys-color-primary, #6750a4);
        animation: loader-pulse 1.6s ease-in-out infinite;
      }
      #app-loader__brand {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--md-sys-color-on-surface, #1c1b1f);
      }
      #app-loader__label {
        font-size: 13px;
        letter-spacing: 0.4px;
        color: var(--md-sys-color-on-surface-variant, #49454f);
      }
      #app-loader__bar {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: var(--md-sys-color-surface-variant, #e7e0ec);
        overflow: hidden;
        margin-top: 4px;
      }
      #app-loader__bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 45%;
        background: var(--md-sys-color-primary, #6750a4);
        border-radius: 2px;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.65; transform: scale(0.92); }
      }
      @keyframes loader-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(322%); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div id="app-loader__card">
        <span id="app-loader__icon">hub</span>
        <div id="app-loader__brand">ChironAI</div>
        <div id="app-loader__label">Stand by&hellip;</div>
        <div id="app-loader__bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
