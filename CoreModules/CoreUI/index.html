<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChironAI</title>

    <!-- Preconnect to Google Font servers to speed up DNS + TLS handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load Material Symbols asynchronously (non-blocking) via media trick.
         Icons appear slightly after first paint, but they never block rendering. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      />
    </noscript>

    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/components/StandByScreen.css" />

    <!-- Apply saved theme BEFORE first paint to avoid purple flash.
         Reads from localStorage set by applyTheme() in App.jsx. -->
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('chironai_theme') || '{}');
          var mode = t.mode || 'system';
          var light = t.lightAccent || 'purple';
          var dark = t.darkAccent || 'cyan';
          var actual =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.classList.add('theme-' + actual);
          document.documentElement.setAttribute(
            'data-accent-color',
            actual === 'dark' ? dark : light
          );
        } catch (e) {}
      })();
    </script>

    <!-- Stand-by screen shown before React mounts -->
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="app-loader" class="standby-screen standby-screen--preboot standby--md">
      <div class="standby-card">
        <div class="standby-loading-indicator" aria-hidden="true">
          <span class="standby-loading-shape standby-loading-shape--one"></span>
          <span class="standby-loading-shape standby-loading-shape--two"></span>
          <span class="standby-loading-shape standby-loading-shape--three"></span>
        </div>
        <div class="standby-copy">
          <div class="standby-brand">ChironAI</div>
          <div class="standby-message">Stand by&hellip;</div>
        </div>
        <div class="standby-progress-stack">
          <div class="standby-progress" role="progressbar" aria-label="Loading CoreUI">
            <span class="standby-progress-fill standby-progress-fill--lead"></span>
            <span class="standby-progress-fill standby-progress-fill--trail"></span>
          </div>
          <div class="standby-progress-meta">
            <span class="standby-module-label">Loading module</span>
            <span class="standby-module-name">CoreUI</span>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
