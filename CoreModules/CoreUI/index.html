<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChironAI</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

    <!-- Apply saved theme BEFORE first paint to avoid purple flash.
         Reads from localStorage set by applyTheme() in App.jsx. -->
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('chironai_theme') || '{}');
          var mode = t.mode || 'system';
          var light = t.lightAccent || 'purple';
          var dark = t.darkAccent || 'cyan';
          var actual =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.classList.add('theme-' + actual);
          document.documentElement.setAttribute(
            'data-accent-color',
            actual === 'dark' ? dark : light
          );
        } catch (e) {}
      })();
    </script>

    <!-- Stand-by screen shown before React mounts -->
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="app-loader" class="standby-screen standby-screen--preboot standby--md" aria-live="polite" role="status" aria-label="Loading CoreUI">
      <div class="standby-card">
        <canvas
          id="standby-m3-canvas"
          class="standby-m3-loading-indicator"
          width="48"
          height="48"
          aria-hidden="true"
        ></canvas>
        <div class="standby-copy">
          <div class="standby-brand">ChironAI</div>
          <div class="standby-message">Stand by&hellip;</div>
        </div>
        <div class="standby-module-meta">
          <span class="standby-module-label">Loading module</span>
          <span class="standby-module-name">CoreUI</span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/preboot.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
