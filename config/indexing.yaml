## Indexing configuration
##
## This file controls how markdown content is filtered, chunked, embedded,
## and indexed into Qdrant. These parameters affect index quality and size.
##
## Keys:
## - min_content_length: minimum body content length to index (chars).
## - exclude_content_head_chars: how many chars from start to check for exclusions.
## - exclude_content_substrings: content substrings that mark low-value pages.
## - exclude_filename_substrings: filename patterns to skip (noise/promo pages).
## - chunk_max_size: maximum characters per chunk.
## - chunk_min_size: minimum characters per chunk (merged if below).
## - min_chunk_words: minimum word count for a valid chunk.
## - min_chunk_alpha_ratio: minimum alphabetic character ratio (filters nav blobs).
## - batch_upsert_size: Qdrant upsert batch size (points per HTTP request).
## - embed_batch_size: embedding batch size for app.py crawler.
## - embed_request_timeout: timeout per embedding request (seconds).
## - embed_retry_attempts: retry attempts for failed embeddings.
## - embed_retry_sleep: sleep seconds between retries [min, max].
## - embed_truncate_chars: max chars when truncating failed embeddings.
## - embed_prefix_max_chars: max length of semantic prefix for embedding (40-80 chars).
## - local_ingest: separate config for ingest_markdown_local.py script.

indexing:
  # Content filtering
  min_content_length: 400
  exclude_content_head_chars: 2000
  
  exclude_content_substrings:
    - "DEVELOPER STORIES"
    - "APP OF THE DAY"
    - "FEATURED APP"
  
  # Filename exclusion patterns
  exclude_filename_substrings:
    - system-fonts
    - sf-symbols
    - symbols-
    - character-set
    - unicode-
    - key-codes
    - keycodes
    - glyph-
    - adventure
    - spotlight
    - featured
    - app-of-the-day
  
  # Chunking parameters
  chunk_max_size: 1200
  chunk_min_size: 300
  chunk_overlap: 150
  min_chunk_words: 5
  min_chunk_alpha_ratio: 0.2
  
  # MD indexer: config-driven markdown cleanup pipeline (config/md_pipelines/*.json)
  md_indexer:
    active_pipeline: default

  # Section headings to strip at index time (autogenerated, low RAG value)
  noise_section_headings:
    - conforming types
    - inherited by
    - inherits from
    - relationships
  
  # Batch processing
  batch_upsert_size: 200
  
  # Embedding configuration
  embed_batch_size: 6
  embed_request_timeout: 300
  embed_retry_attempts: 2
  embed_retry_sleep:
    - 1
    - 3
  embed_truncate_chars: 4096
  # Semantic prefix for chunk embedding: max length 40-80 chars to improve retrieval without noise
  embed_prefix_max_chars: 80
  
  # Local markdown ingestion (ingest_markdown_local.py)
  local_ingest:
    embed_batch_size: 32
    chunk_size: 1200
    chunk_overlap: 150
