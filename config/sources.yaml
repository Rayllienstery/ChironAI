- id: hws_swift
  url: https://www.hackingwithswift.com
  max_depth: 2
  crawler: playwright
  doc_only: false
  # Focus on Swift Knowledge Base, SwiftUI by Example, and Hacking with iOS content.
  path_prefixes:
  - /example-code
  - /quick-start/swiftui
  - /read
  excluded_path_substrings:
  - /store
  - /careers
  - /subscribe
  - /newsletter
  - /login
  - /signup
  seed_urls:
  - https://www.hackingwithswift.com/example-code
  - https://www.hackingwithswift.com/quick-start/swiftui
  - https://www.hackingwithswift.com/read
  extra:
    type: community_swift_docs
    site: hackingwithswift
    strip_toc: true
    strip_store_cta: true

