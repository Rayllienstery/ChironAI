## Ollama model configuration
##
## This file centralizes all Ollama endpoints and model identifiers used by
## ChironAI. The Python config loader allows overriding most of these
## values via environment variables for local experimentation.
##
## Keys:
## - ollama.chat_url: /api/chat endpoint for main assistant model.
## - ollama.generate_url: /api/generate endpoint for tooling / rerank helpers.
## - ollama.embed_url: /api/embed endpoint for vector creation.
## - ollama.chat_model: model name used by rag_proxy and rag_client for final answers.
## - ollama.rerank_model: model name used for LLM rerank (Ollama generate).
## - ollama.embed_model: model name used for embeddings (RAG index + queries).
## - ollama.timeout_seconds: default HTTP timeout for chat/generate calls.
## - ollama.embed_timeout_seconds: HTTP read timeout for /api/embed (single request; slow CPU/GPU may need 180–300).
## - ollama.chat_options: default generation options for /api/chat.

ollama:
  chat_url: "http://localhost:11434/api/chat"
  generate_url: "http://localhost:11434/api/generate"
  embed_url: "http://localhost:11434/api/embed"
  chat_model: ""
  rerank_model: ""
  embed_model: "mxbai-embed-large"
  timeout_seconds: 300
  embed_timeout_seconds: 180
  chat_options:
    num_predict: 3072
    temperature: 0.0
    # Ollama (incl. cloud) requires top_p=1 when temperature is 0 (greedy); otherwise 400.
    top_p: 1.0

