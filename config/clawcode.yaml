## ClawCode — agent HTTP (OpenAI-compatible) + optional MCP info port + vendor claw-code
##
## Env overrides (examples):
##   CLAWCODE_ENABLED=0
##   CLAWCODE_OPENAI_PORT=8082
##   CLAWCODE_MCP_PORT=8083
##   CLAWCODE_MAX_AGENT_STEPS=64
##   CLAWCODE_MERGE_CLIENT_TOOLS=1  # merge Copilot/IDE tool schemas; enables pass-through for client-only tool_calls
##   CLAWCODE_GITHUB_OWNER=ultraworkers
##   CLAWCODE_GITHUB_REPO=claw-code-parity
##   CLAWCODE_THINK_NUM_PREDICT_FLOOR=12288  # min num_predict when ClawCode requests Ollama think: true (thinking + content share one budget)
##   CHIRONAI_WEBUI_DIR — WebUI folder for RAG wiring (default: <repo>/WebUI)

clawcode:
  enabled: true
  host: "0.0.0.0"
  openai_port: 8082
  mcp_port: 8083
  mcp_http_enabled: true
  max_agent_steps: 40
  # IDE mode (merge_client_tools): when true (default), Ollama sees rag_query plus client tool schemas (Copilot, etc.);
  # non-rag tool_calls are returned to the IDE for local execution. When false, only rag_query — for RAG-only clients
  # or simple HTTP callers that do not implement a tool loop.
  merge_client_tools: true
  request_timeout_seconds: 300
  trace_buffer_size: 80
  # When WebUI enables "think", raise Ollama num_predict to at least this (overridden by CLAWCODE_THINK_NUM_PREDICT_FLOOR).
  think_num_predict_floor: 12288
  vendor:
    github_owner: "ultraworkers"
    github_repo: "claw-code-parity"
    branch: "main"
    root_relative: "vendor/claw-code"
